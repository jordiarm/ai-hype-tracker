name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check airflow/

  sql-lint:
    name: SQL Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install sqlfluff sqlfluff-templater-dbt dbt-bigquery
      - run: sqlfluff lint models/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"
      - run: terraform init -backend=false
      - run: terraform fmt -check
      - run: terraform validate

  dbt-build:
    name: dbt Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install dbt-bigquery

      - name: Authenticate to GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" | base64 -d > /tmp/gcp_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json" >> "$GITHUB_ENV"

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          ai_hype_tracker:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: ai-hype-tracker
                dataset: ai_hype_tracker
                location: EU
                threads: 4
                keyfile: /tmp/gcp_key.json
          EOF

      - run: dbt deps
      - run: dbt build

  deploy-dag:
    name: Deploy DAG
    needs: [python-lint, sql-lint, terraform-validate, dbt-build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" | base64 -d > /tmp/gcp_key.json
          gcloud auth activate-service-account --key-file=/tmp/gcp_key.json
          gcloud config set project ai-hype-tracker

      - name: Deploy DAG to Airflow VM
        run: |
          gcloud compute ssh airflow-vm \
            --zone europe-west4-a \
            --tunnel-through-iap \
            --quiet \
            --command "mkdir -p ~/airflow/dags"
          gcloud compute scp airflow/dags/github_ingestion_daily_append.py \
            airflow-vm:~/airflow/dags/github_ingestion_daily_append.py \
            --zone europe-west4-a \
            --tunnel-through-iap \
            --quiet
